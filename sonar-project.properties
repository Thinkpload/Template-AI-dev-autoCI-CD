# ─────────────────────────────────────────────────────────────
# SonarCloud project configuration
# TODO: Replace YOUR_ORG and YOUR_REPO with your actual values.
# Get projectKey and organization from: https://sonarcloud.io/projects/create
# See .github/SETUP.md for step-by-step SonarCloud setup instructions.
# ─────────────────────────────────────────────────────────────

sonar.projectKey=YOUR_ORG_YOUR_REPO
sonar.organization=YOUR_ORG
sonar.projectName=Template_BMAD_auto-CI-CD

# Source & test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage report (generated by vitest --coverage)
# Comment updated: was 'jest --coverage', now uses vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files from coverage reporting
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,scripts/**

# Exclude generated / third-party / non-app folders from analysis
sonar.exclusions=**/node_modules/**,wizard/**,_bmad/**,_bmad-output/**,.next/**,dist/**,build/**,coverage/**
