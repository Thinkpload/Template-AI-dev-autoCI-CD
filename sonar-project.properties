# ─────────────────────────────────────────────────────────────
# SonarCloud project configuration
# Replace YOUR_ORG and YOUR_REPO with your actual values.
# See README.md → SonarCloud Setup for instructions.
# ─────────────────────────────────────────────────────────────

sonar.projectKey=YOUR_ORG_YOUR_REPO
sonar.organization=YOUR_ORG

# Source & test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated / third-party folders from analysis
sonar.exclusions=node_modules/**,coverage/**,_bmad/**,_bmad-output/**,.next/**,dist/**,build/**
