name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip bot commits (e.g., from release automation)
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # --legacy-peer-deps required: better-auth/drizzle-kit peer dep conflict
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # --legacy-peer-deps required: better-auth/drizzle-kit peer dep conflict
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Coverage thresholds (85% statements/lines, 80% branches/functions) enforced in vitest.config.ts
      - name: Run tests with coverage
        run: npm run test:coverage

      # Upload coverage only from Node 20 to avoid artifact name collision
      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

  sonarcloud:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      # fetch-depth: 0 required for SonarCloud blame data (full git history)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build
    needs: sonarcloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # --legacy-peer-deps required: better-auth/drizzle-kit peer dep conflict
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Stub env vars — no real DB available in CI, SKIP_ENV_VALIDATION bypasses runtime env checks
      - name: Build Next.js app
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          NEXTAUTH_SECRET: 'ci-stub-secret-32-chars-minimum!!'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Report CI Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "**Job:** \`${{ github.job }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > issue_body.md
          gh issue create \
            --title "CI Failed: build on ${{ github.ref_name }} (#${{ github.run_number }})" \
            --body-file issue_body.md \
            --label "bug,ci-failure" || true
