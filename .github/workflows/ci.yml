name: CI — Check Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Test · Sonar · Build
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history needed for SonarCloud blame data
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high > audit.log 2>&1 || (cat audit.log && exit 1)

      - name: Check no @latest in wizard source
        run: |
          if grep -r "@latest" wizard/src/ 2>/dev/null; then
            echo "ERROR: @latest found in wizard/src/ — all versions must be pinned in wizard/src/dependency-versions.ts"
            exit 1
          fi
          echo "OK: no @latest found in wizard source"

      - name: Lint
        run: npm run lint > lint.log 2>&1 || (cat lint.log && exit 1)

      - name: Run Tests
        run: npm run test:coverage > test.log 2>&1 || (cat test.log && exit 1)

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build
        run: npm run build > build.log 2>&1 || (cat build.log && exit 1)

      - name: Report CI Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "**Job:** \`${{ github.job }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
          } > issue_body.md
          if [ -f audit.log ]; then
            echo "**Audit Logs:**" >> issue_body.md
            echo '```text' >> issue_body.md
            tail -n 50 audit.log >> issue_body.md
            echo '```' >> issue_body.md
            echo "" >> issue_body.md
          fi
          if [ -f lint.log ]; then
            echo "**Lint Logs:**" >> issue_body.md
            echo '```text' >> issue_body.md
            tail -n 50 lint.log >> issue_body.md
            echo '```' >> issue_body.md
            echo "" >> issue_body.md
          fi
          if [ -f test.log ]; then
            echo "**Test Logs:**" >> issue_body.md
            echo '```text' >> issue_body.md
            tail -n 50 test.log >> issue_body.md
            echo '```' >> issue_body.md
            echo "" >> issue_body.md
          fi
          if [ -f build.log ]; then
            echo "**Build Logs:**" >> issue_body.md
            echo '```text' >> issue_body.md
            tail -n 50 build.log >> issue_body.md
            echo '```' >> issue_body.md
            echo "" >> issue_body.md
          fi
          gh issue create \
            --title "CI Failed: ${{ github.job }} on ${{ github.ref_name }} (#${{ github.run_number }})" \
            --body-file issue_body.md \
            --label "bug,ci-failure" || true
